function generateReview(keyword){

const resultBox =
document.getElementById("reviewResult");

const arr = reviews[keyword];

let shuffled =
arr.sort(()=>0.5-Math.random());

let finalText =
shuffled.slice(0,3).join("");

resultBox.textContent = finalText;

copyText(finalText);

}

function copyReview(){

const text =
document.getElementById("reviewResult").innerText;

if(text.includes("点击关键词")){
showToast("请先生成评价");
return;
}

copyText(text);

}

function copyText(text){

if(navigator.clipboard){

navigator.clipboard.writeText(text)
.then(()=>{
showToast("评价已复制");
});

}else{

fallbackCopy(text);

}

}

function fallbackCopy(text){

const textarea =
document.createElement("textarea");

textarea.value = text;

document.body.appendChild(textarea);

textarea.select();

document.execCommand("copy");

document.body.removeChild(textarea);

showToast("评价已复制");

}

function showToast(message){

const toast =
document.createElement("div");

toast.className = "toast";

toast.innerText = message;

document.body.appendChild(toast);

setTimeout(()=>{
toast.remove();
},1800);

}

function openWechat(){

showToast("正在打开微信");

setTimeout(()=>{

window.location.href =
"weixin://";

},500);

}
