<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>NFC 公寓服务中心</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#f5f6f8;
  font-family:Arial,"Microsoft YaHei";
  color:#222;
}

.container{
  max-width:430px;
  margin:auto;
  padding:20px;
}

.card{
  background:#fff;
  border-radius:24px;
  padding:26px;
  box-shadow:0 10px 35px rgba(0,0,0,0.08);
}

.logo{
  width:90px;
  height:90px;
  background:#111;
  color:#fff;
  border-radius:50%;
  line-height:90px;
  text-align:center;
  margin:auto;
  font-size:32px;
  font-weight:bold;
}

h1{
  text-align:center;
  margin-top:18px;
  font-size:28px;
}

.desc{
  text-align:center;
  margin-top:10px;
  margin-bottom:24px;
  color:#666;
  font-size:14px;
}

.review-box{
  background:#f8f8f8;
  border-radius:18px;
  padding:18px;
  margin-bottom:22px;
}

.review-title{
  font-size:18px;
  font-weight:bold;
  margin-bottom:10px;
}

.review-tip{
  color:#777;
  font-size:13px;
  margin-bottom:16px;
  line-height:1.6;
}

.keywords{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

.tag{
  background:#fff;
  border:1px solid #ddd;
  border-radius:30px;
  padding:10px 14px;
  cursor:pointer;
  transition:0.25s;
  font-size:14px;
}

.tag:hover{
  background:#111;
  color:#fff;
}

.review-result{
  margin-top:18px;
  background:#fff;
  border-radius:14px;
  padding:16px;
  min-height:280px;
  border:1px solid #eee;
  line-height:1.9;
  font-size:15px;
  color:#333;
  white-space:pre-wrap;
}

.copy-btn{
  width:100%;
  padding:15px;
  border:none;
  background:#111;
  color:#fff;
  border-radius:14px;
  margin-top:15px;
  font-size:16px;
  cursor:pointer;
}

.btn{
  display:block;
  width:100%;
  text-decoration:none;
  text-align:center;
  color:#fff;
  padding:16px;
  border-radius:14px;
  margin-top:14px;
  font-size:17px;
  font-weight:bold;
  border:none;
  cursor:pointer;
}

.wechat{
  background:#07c160;
}

.footer{
  text-align:center;
  margin-top:24px;
  color:#999;
  font-size:12px;
}

.toast{
  position:fixed;
  bottom:90px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.82);
  color:#fff;
  padding:12px 18px;
  border-radius:30px;
  font-size:14px;
  z-index:9999;
}

</style>

</head>

function generateReview(keyword){

const resultBox =
document.getElementById("reviewResult");

const arr = reviews[keyword];

const text =
arr[Math.floor(Math.random()*arr.length)];

resultBox.textContent = text;

copyText(text);

}

function copyReview(){

const text =
document.getElementById("reviewResult").innerText;

if(text.includes("点击关键词")){
showToast("请先生成评价");
return;
}

copyText(text);

}

function copyText(text){

if(navigator.clipboard){

navigator.clipboard.writeText(text)
.then(()=>{
showToast("评价已复制");
});

}else{

fallbackCopy(text);

}

}

function fallbackCopy(text){

const textarea =
document.createElement("textarea");

textarea.value = text;

document.body.appendChild(textarea);

textarea.select();

document.execCommand("copy");

document.body.removeChild(textarea);

showToast("评价已复制");

}

function showToast(message){

const toast =
document.createElement("div");

toast.className = "toast";

toast.innerText = message;

document.body.appendChild(toast);

setTimeout(()=>{
toast.remove();
},1800);

}

function openWechat(){

showToast("正在打开微信");

setTimeout(()=>{

window.location.href =
"weixin://";

},500);

}
